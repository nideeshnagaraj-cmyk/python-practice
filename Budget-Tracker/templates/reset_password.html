{% extends "base.html" %}

{% block title %}Reset Password - TrackFlow{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="glass-panel">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
            <a href="{{ url_for('profile') }}" style="color: var(--text-muted); font-size: 1.5rem;"><i
                    class="ph-bold ph-arrow-left"></i></a>
            <h2 style="margin: 0;">Reset Password</h2>
        </div>

        <form method="POST" action="{{ url_for('reset_password') }}">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Current Password</label>
                <input type="password" name="current_password" class="form-control" required
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: white;">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">New Password</label>
                <input type="password" name="new_password" class="form-control" required
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: white;">
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Confirm New
                    Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" required
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); color: white;">
            </div>

            <div class="form-group" style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="showPasswords" style="cursor: pointer; width: 16px; height: 16px;">
                <label for="showPasswords" style="color: var(--text-muted); cursor: pointer; user-select: none;">Show
                    Passwords</label>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 8px;">Update Password</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('showPasswords').addEventListener('change', function () {
        const passwordInputs = document.querySelectorAll('input[type="password"], input.password-toggle');
        passwordInputs.forEach(input => {
            // mark them with a class so we can find them when changing back
            if (this.checked) {
                input.type = 'text';
                input.classList.add('password-toggle');
            } else {
                input.type = 'password';
                input.classList.remove('password-toggle');
            }
        });
    });
</script>
{% endblock %}
