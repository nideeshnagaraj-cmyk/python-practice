{% extends "base.html" %}

{% block title %}Log In - TrackFlow{% endblock %}

{% block content %}
<style>
    .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 120px);
    }

    .auth-card {
        width: 100%;
        max-width: 400px;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.9rem;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        color: white;
        font-family: inherit;
        font-size: 1rem;
        transition: all var(--transition-speed);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary-color);
        background: rgba(0, 0, 0, 0.2);
    }

    .auth-title {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-links {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
    }

    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0;
        display: flex;
        font-size: 1.2rem;
        transition: color var(--transition-speed);
    }

    .toggle-password:hover {
        color: white;
    }
</style>

<div class="container auth-container">
    <div class="glass-panel auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between;">
                    <label for="password" style="margin-bottom: 0;">Password</label>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-control" required
                        style="padding-right: 40px;">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)"
                        aria-label="Toggle password visibility">
                        <i class="ph-bold ph-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        </form>

        <form method="POST" action="{{ url_for('guest_login') }}" style="margin-top: 1rem;">
            <button type="submit" class="btn btn-outline" style="width: 100%;">Continue as Guest</button>
        </form>

        <div class="auth-links">
            <span style="color: var(--text-muted);">Don't have an account?</span>
            <a href="{{ url_for('register') }}">Sign up here</a>
        </div>
    </div>
</div>

<script>
    function togglePasswordVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('ph-eye');
            icon.classList.add('ph-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('ph-eye-slash');
            icon.classList.add('ph-eye');
        }
    }
</script>
{% endblock %}
